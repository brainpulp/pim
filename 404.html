<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA fallback for GitHub Pages: redirect 404s back to index with path in query
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash);
  </script>
</head>
</html>
